name: Build Minecraft Plugin

on:
  push:
    branches: [ "main", "master" ] # Triggers the build when you push to main or master
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to trigger the build manually from GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out your plugin code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up Java 17 environment required for 1.21.x compilation
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # Automatically caches dependencies to speed up future builds

    # Step 3: Run the Maven command to compile the .jar
    - name: Build with Maven
      run: mvn clean package --batch-mode

    # Step 4: Upload the compiled .jar so you can download it from GitHub
    - name: Upload Compiled JAR
      uses: actions/upload-artifact@v4
      with:
        name: ClassicDupeSim-JAR
        path: target/*.jar
